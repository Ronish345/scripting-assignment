<!DOCTYPE html>
<html>
<body>

First Number:
<input type="text" id="n1"><br><br>

Second Number:
<input type="text" id="n2"><br><br>

<button onclick="display()">Display</button>

<p id="result"></p>

<script>
function display()
{
    let a=parseInt(document.getElementById("n1").value);
    let b=parseInt(document.getElementById("n2").value);

    if(isNaN(a)||isNaN(b))
    {
        alert("Enter valid numbers");
        return;
    }

    if(a<=0||b<=0)
    {
        alert("Numbers must be positive");
        return;
    }

    if(a>=b)
    {
        alert("First number must be smaller");
        return;
    }

    let output="";

    for(let i=a;i<=b;i++)
    {
        if(i%2==0)
            output+="<b>"+i+"</b><br>";
        else
            output+=i+"<br>";
    }

    document.getElementById("result").innerHTML=output;
}
</script>

</body>
</html>
