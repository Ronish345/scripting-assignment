<!DOCTYPE html>
<html>
<body>

<script>
    let num = prompt("Enter a number");

    if(!isNaN(num)){
        for(let i = 1; i <= 10; i++){
            document.write(`${num} x ${i} = ${num * i}<br>`);
        }
    }
    else{
        document.write("Invalid Input");
    }
</script>

</body>
</html>
